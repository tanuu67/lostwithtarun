<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost With Tarun | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Clean Mountain Landscape Background */
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1454496522488-7a8e488e8606?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            padding: 4px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        p.bio {
            font-size: 14px;
            font-weight: 300;
            color: #cbd5e1;
            margin-bottom: 30px;
            text-align: center;
        }

        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-decoration: none;
            color: #f8fafc;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn i {
            position: absolute;
            left: 24px;
            font-size: 20px;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .section-divider {
            width: 100%;
            text-align: center;
            margin: 24px 0 8px 0;
            position: relative;
        }

        .section-divider span {
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
            font-weight: 300;
        }
        
        footer a {
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <img src="https://images.unsplash.com/photo-1486870591958-9b9d0d1dda99?auto=format&fit=crop&w=200&q=80" alt="Lost With Tarun" class="profile-img">
        
        <h1>Lost With Tarun</h1>
        <p class="bio">Trekking | Motorcycle Travel | Exploration</p>

        <div class="links-wrapper">
            <a href="https://www.youtube.com/@LostWithTarun" target="_blank" class="link-btn">
                <i class="fab fa-youtube" style="color: #ff0000;"></i> YouTube
            </a>
            <a href="https://www.instagram.com/lostwithtarun_/" target="_blank" class="link-btn">
                <i class="fab fa-instagram" style="color: #e1306c;"></i> Instagram
            </a>

            <div class="section-divider">
                <span>My Gear & Setup</span>
            </div>
            <a href="YOUR_AFFILIATE_LINK" target="_blank" class="link-btn">
                <i class="fas fa-motorcycle" style="color: #cbd5e1;"></i> Bike Accessories
            </a>
            <a href="YOUR_AFFILIATE_LINK" target="_blank" class="link-btn">
                <i class="fas fa-campground" style="color: #cbd5e1;"></i> Trekking & Camping Kit
            </a>
            <a href="YOUR_AFFILIATE_LINK" target="_blank" class="link-btn">
                <i class="fas fa-camera" style="color: #cbd5e1;"></i> Vlogging Camera Setup
            </a>

            <div class="section-divider">
                <span>Professional</span>
            </div>
            <a href="YOUR_AGENCY_LINK" target="_blank" class="link-btn">
                <i class="fas fa-laptop-code" style="color: #3b82f6;"></i> Website Development | SkyWeb
            </a>
        </div>

        <footer>
            © 2026 Lost With Tarun
        </footer>
    </div>

</body>
</html>
