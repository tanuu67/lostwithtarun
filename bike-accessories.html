<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gears & Accessories | Lost With Tarun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1454496522488-7a8e488e8606?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            color: #cbd5e1;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-row {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .product-row:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.01);
        }

        .product-info h3 {
            font-size: 16px;
            font-weight: 400;
            color: #f8fafc;
            line-height: 1.4;
        }

        .buy-btn {
            background: #ff9900;
            color: #000000;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s ease;
        }

        .buy-btn:hover {
            background: #ffb84d;
        }

        @media (max-width: 600px) {
            .product-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .buy-btn {
                width: 100%;
                justify-content: center;
            }
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <h1>Riding Gears & Gadgets</h1>
        </div>

        <div class="product-list">
            
            <div class="product-row">
                <div class="product-info">
                    <h3>Blinking Strobe Rear Warning Red Safety Night Riding Light (USB Rechargeable)</h3>
                </div>
                <a href="https://amzn.to/3QxXZho" target="_blank" class="buy-btn">
                    <i class="fab fa-amazon"></i> Buy Now
                </a>
            </div>

            <div class="product-row">
                <div class="product-info">
                    <h3>BluArmor C30 Mesh Bluetooth Intercom Communication System</h3>
                </div>
                <a href="https://amzn.to/4tiLLaX" target="_blank" class="buy-btn">
                    <i class="fab fa-amazon"></i> Buy Now
                </a>
            </div>

        </div>

        <footer>
            © 2026 Lost With Tarun
        </footer>
    </div>

</body>
</html>
