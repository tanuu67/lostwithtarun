<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gears & Accessories | Lost With Tarun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1454496522488-7a8e488e8606?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            color: #cbd5e1;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .category-title {
            font-size: 20px;
            font-weight: 600;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
        }

        .category-title i {
            color: #3b82f6;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .img-container {
            width: 100%;
            height: 200px;
            background: #ffffff;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
        }

        .product-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-title {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: #f8fafc;
            margin-bottom: 8px;
            flex-grow: 1;
        }

        .buy-btn {
            background: #ff9900;
            color: #000000;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.3s ease;
            width: 100%;
        }

        .buy-btn:hover {
            background: #ffb84d;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
            <h1>My Riding Setup</h1>
        </div>

        <h2 class="category-title"><i class="fas fa-motorcycle"></i> Bike Accessories</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-container">
                    <img src="https://m.media-amazon.com/images/I/51I-mXmPjUL._SL1000_.jpg" alt="Safety Light" class="product-img">
                </div>
                <h3 class="product-title">Blinking Strobe Rear Warning Red Safety Night Riding Light (USB Rechargeable)</h3>
                
                <a href="https://amzn.to/3QxXZho" target="_blank" class="buy-btn">
                    <i class="fab fa-amazon"></i> View on Amazon
                </a>
            </div>

        </div>

        <footer>
            © 2026 Lost With Tarun | Gear Setup
        </footer>
    </div>

</body>
</html>
